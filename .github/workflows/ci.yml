name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  MANIFEST: rust/Cargo.toml

jobs:
  check:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Check
        run: cargo check --manifest-path $MANIFEST

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path $MANIFEST -- -D warnings

      - name: Format check
        run: cargo fmt --manifest-path $MANIFEST -- --check

      - name: Run tests
        run: cargo test --manifest-path $MANIFEST

  build-release:
    name: Build release binary
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build release
        run: cargo build --release --manifest-path $MANIFEST

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: armoury-tui-linux-x86_64
          path: rust/target/release/armoury-tui
